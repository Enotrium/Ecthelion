# ── Ruff Linting & Formatting Configuration ──────────────────
# HAP framework: strict but pragmatic rules for production HDC code.

target-version = "py310"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "PL",  # pylint
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific rules
]
ignore = [
    "PLR0913",  # too-many-arguments (common for HDC constructors)
    "PLR2004",  # magic-value-comparison (many physics constants)
    "SIM102",   # collapsible-if (explicit is clearer for HDC logic)
    "B904",     # raise-without-from-in-except (not always appropriate)
    "B905",     # zip-without-explicit-strict (Python 3.10+; local dev on 3.9)
]
per-file-ignores = {
    "tests/*" = ["D", "PLC0415", "N802", "B905", "F841", "RUF059", "RUF002"],
    "hap/*" = ["RUF002", "D", "RUF003", "N806"],
    "hap/sparse_hdc.py" = ["RUF002", "D", "RUF003", "N806", "E402"],
    "hap/metrics.py" = ["RUF002", "D", "RUF003", "N806", "PLW0603"],
}

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[lint.isort]
known-first-party = ["hap"]